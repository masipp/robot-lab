# Pytest configuration file

[pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Markers for organizing tests
markers =
    slow: marks tests as slow (training tests that take >10 seconds)
    fast: marks tests as fast (should complete in <5 seconds)
    smoke: basic import and dependency tests

# Disable auto-loading of ROS/system pytest plugins
norecursedirs = .git .venv __pycache__ *.egg-info

# Output options
addopts =
    -v
    -ra
    --strict-markers
    --tb=short
    -p no:ament_xmllint
    -p no:ament_flake8
    -p no:ament_copyright
    -p no:launch_testing
    -p no:launch_testing_ros
    -p no:ament_lint
    -p no:ament_pep257
    -p no:colcon_core
